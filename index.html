<!DOCTYPE html>
<html lang="en" class="duration-150 transition-colors">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="The yield protocol for digital assets" />

    <!-- Open Graph -->
    <meta property="og:title" content="Yearn Finance" />

      property="og:description"
      content="The yield protocol for digital assets"

    <link rel="stylesheet" href="/fonts/fonts.css" />

    <title>Yearn Finance</title>

      // Apply midnight theme immediately to prevent flash
      const root = document.documentElement
      root.setAttribute('data-theme', 'midnight')
      root.classList.add('dark', 'v3')
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
